services:
  - type: web
    name: monarka-group
    env: node
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /opt/render/project/src/monarka.db
    disk:
      name: monarka-data
      mountPath: /opt/render/project/src
      sizeGB: 1
